name: Test fiche LLM pipeline (manual)

# Workflow manuel pour tester le pipeline de generation auto de fiches crypto
# (Phase 3 POC). Trigger via GitHub UI > Actions > "Test fiche LLM pipeline" > Run workflow.
#
# L'output est uploade en artifact telechargeable (JSON + preview Markdown).
# Permet d'evaluer la qualite editoriale sans configurer OPENROUTER_API_KEY localement.

on:
  workflow_dispatch:
    inputs:
      coingeckoId:
        description: "coingeckoId a tester (ex: solana, aave, mantra, dogecoin)"
        required: true
        default: "solana"
        type: string
      model:
        description: "LLM model (Gemini Flash gratuit + stable recommande)"
        required: false
        default: "google/gemini-2.5-flash"
        type: choice
        options:
          - google/gemini-2.5-flash
          - google/gemini-1.5-flash
          - google/gemini-1.5-pro
          - meta-llama/llama-3.3-70b-instruct:free
          - qwen/qwen3-next-80b-a3b-instruct:free
          - z-ai/glm-4.5-air:free
          - anthropic/claude-sonnet-4.5
          - anthropic/claude-sonnet-4.6
          - anthropic/claude-haiku-4.5

permissions:
  contents: read

concurrency:
  group: test-fiche-pipeline
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Generate fiche
        id: gen
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_MODEL: ${{ inputs.model }}
        run: |
          MODEL="${{ inputs.model }}"
          echo "Pipeline target: ${{ inputs.coingeckoId }}"
          echo "Model: $MODEL"
          if [[ "$MODEL" == google/gemini-* ]]; then
            if [ -z "$GEMINI_API_KEY" ]; then
              echo "❌ GEMINI_API_KEY secret missing (required for Gemini models)"; exit 1
            fi
          else
            if [ -z "$OPENROUTER_API_KEY" ]; then
              echo "❌ OPENROUTER_API_KEY secret missing (required for non-Gemini models)"; exit 1
            fi
          fi
          node scripts/generate-fiche-crypto.mjs "${{ inputs.coingeckoId }}"

      - name: List output
        run: |
          ls -la content/cryptos-fiches/ || echo "(no JSON output)"
          ls -la content/cryptos-fiches/preview/ || echo "(no preview output)"

      - name: Upload fiche artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fiche-${{ inputs.coingeckoId }}-${{ github.run_id }}
          path: |
            content/cryptos-fiches/${{ inputs.coingeckoId }}.json
            content/cryptos-fiches/preview/${{ inputs.coingeckoId }}.md
          if-no-files-found: warn
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "### Test fiche pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Crypto** : \`${{ inputs.coingeckoId }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Model** : \`${{ inputs.model }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Status** : ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Telecharge l'artifact \`fiche-${{ inputs.coingeckoId }}-${{ github.run_id }}\` ci-dessous pour voir le preview Markdown." >> $GITHUB_STEP_SUMMARY
