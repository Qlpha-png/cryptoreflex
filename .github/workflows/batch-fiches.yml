name: Batch generate fiches T3 (manual)

# Workflow manuel pour generer en lot des fiches crypto T3 (Phase 1 scaling).
# Trigger via GitHub UI > Actions > "Batch generate fiches T3" > Run workflow.
#
# Resumable : skip les coingeckoIds deja en DB par defaut (--skip-existing).
# Cout estime : ~$0.09/fiche (Sonnet 4.5).
#
# Recommandations volumes :
#  - 50    : ~5 min, $4.5  (smoke test)
#  - 200   : ~25 min, $18  (validation 200 top)
#  - 1000  : ~3h, $90      (Phase 1 complete top 1000)
#  - 5000  : ~16h, $450    (top 5K — overnight long run)

on:
  workflow_dispatch:
    inputs:
      count:
        description: "Nb cryptos a traiter"
        required: true
        default: "50"
        type: string
      start_rank:
        description: "Rank market cap de depart (1 = top crypto)"
        required: false
        default: "1"
        type: string
      rate_limit_ms:
        description: "Delay entre cryptos (ms) — 6000 = 1 toutes 6s, conservatif"
        required: false
        default: "6000"
        type: string
      skip_existing:
        description: "Skip coingeckoIds deja en DB"
        required: false
        default: true
        type: boolean
      min_quality:
        description: "Min quality_score 0-100 (50 = filtre 1000 meilleurs, 0 = pas de filtre)"
        required: false
        default: "50"
        type: string
      model:
        description: "LLM model (Haiku 4.5 default — qualite premium personnalisee ~\\$0.03/fiche)"
        required: false
        default: "anthropic/claude-haiku-4.5"
        type: choice
        options:
          - anthropic/claude-haiku-4.5
          - anthropic/claude-sonnet-4.5
          - anthropic/claude-sonnet-4.6
          - google/gemini-2.5-flash
          - google/gemini-1.5-flash
          - google/gemini-1.5-pro
          - meta-llama/llama-3.3-70b-instruct:free
          - qwen/qwen3-next-80b-a3b-instruct:free
          - z-ai/glm-4.5-air:free
      dry_run:
        description: "Dry run (gratuit, pas de LLM call)"
        required: false
        default: false
        type: boolean
      coingecko_ids:
        description: "Liste CSV de coingecko_ids à régen (bypass count/start_rank/min_quality/skip_existing). Ex: bitcoin,ethereum,solana"
        required: false
        default: ""
        type: string
      scan_window:
        description: "[Mode rerank] Fenêtre de scan top market_cap (ex: 5000 = top 5000 cryptos). 0 = mode classique."
        required: false
        default: "0"
        type: string
      top_quality:
        description: "[Mode rerank] Garde les N cryptos avec le plus haut quality_score après scan. Ex: 1000."
        required: false
        default: "0"
        type: string

permissions:
  contents: read

# 1 batch a la fois pour eviter race condition sur DB upsert.
concurrency:
  group: batch-fiches
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    # Timeout proportionnel : ~10s/fiche × count + buffer.
    # Hardcode 6h (max GitHub Actions free tier = 6h).
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node 22 (WebSocket natif requis par @supabase/realtime-js)
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Supabase JS
        run: |
          npm install --no-save @supabase/supabase-js@^2.104.1
          echo "✓ Dependencies installed"

      - name: Generate batch
        id: gen
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Cycle 25 : COINGECKO_API_KEY (Demo) double le rate limit
          # (~100 r/min vs 30 free) — critique pour scan-window > 750.
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LLM_MODEL: ${{ inputs.model }}
        run: |
          ARGS="--count=${{ inputs.count }} --start-rank=${{ inputs.start_rank }} --rate-limit-ms=${{ inputs.rate_limit_ms }} --min-quality=${{ inputs.min_quality }}"
          if [ "${{ inputs.skip_existing }}" = "false" ]; then
            ARGS="$ARGS --no-skip-existing"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          # Cycle 24 : regen ciblée — si coingecko_ids fourni, override les autres filtres.
          if [ -n "${{ inputs.coingecko_ids }}" ]; then
            ARGS="$ARGS --coingecko-ids=${{ inputs.coingecko_ids }}"
          fi
          # Cycle 25 : mode rerank par quality_score sur fenêtre élargie.
          if [ "${{ inputs.scan_window }}" != "0" ] && [ -n "${{ inputs.scan_window }}" ]; then
            ARGS="$ARGS --scan-window=${{ inputs.scan_window }} --top-quality=${{ inputs.top_quality }}"
          fi
          MODEL="${{ inputs.model }}"
          echo "Model: $MODEL"
          echo "Running: node scripts/batch-generate-fiches.mjs $ARGS"
          if [ "${{ inputs.dry_run }}" != "true" ]; then
            if [[ "$MODEL" == google/gemini-* ]]; then
              if [ -z "$GEMINI_API_KEY" ]; then
                echo "❌ GEMINI_API_KEY required for Gemini models"; exit 1
              fi
            else
              if [ -z "$OPENROUTER_API_KEY" ]; then
                echo "❌ OPENROUTER_API_KEY required for non-Gemini models"; exit 1
              fi
            fi
            if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]; then
              echo "❌ SUPABASE_URL + SUPABASE_SERVICE_ROLE_KEY required"; exit 1
            fi
          fi
          node scripts/batch-generate-fiches.mjs $ARGS

      - name: Summary
        if: always()
        run: |
          echo "### Batch fiches T3" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Count** : ${{ inputs.count }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Start rank** : ${{ inputs.start_rank }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Model** : ${{ inputs.model }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Skip existing** : ${{ inputs.skip_existing }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dry run** : ${{ inputs.dry_run }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status** : ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
