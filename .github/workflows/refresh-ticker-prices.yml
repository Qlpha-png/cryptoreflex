name: Refresh ticker prices KV (every 10 min)

# Pré-charge top 50 cryptos en KV via cron CG /coins/markets — découple
# /api/prices du rate limit CG live. KV TTL 6min, donc 10min cron = 4min
# de marge si retry GH Actions slow.
#
# Coût GH Actions : ~144 runs/jour × ~15s = ~36 min/jour = 1080 min/mois.
# Sous le free tier 2000 min/mois (32% utilisation).

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: refresh-ticker-prices
  cancel-in-progress: true

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Trigger /api/cron/refresh-ticker-prices (tolère CG ban transient)
        run: |
          # Retry 3 fois avec backoff 30s/60s/120s — pour absorber les bans CG transients.
          # Ne PAS utiliser -f (qui fail si HTTP non-2xx). On accepte 502 (= CG temporairement
          # banni) car KV reste peuplé entretemps et le cron du daily-orchestrator
          # le repopule de toute façon 1×/jour.
          for attempt in 1 2 3; do
            HTTP_CODE=$(curl -sS \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              --max-time 60 \
              -w "%{http_code}" \
              -o /tmp/response.json \
              "https://www.cryptoreflex.fr/api/cron/refresh-ticker-prices" || echo "000")
            echo "Attempt $attempt: HTTP $HTTP_CODE"
            cat /tmp/response.json 2>/dev/null || true
            echo
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Success on attempt $attempt"
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "⏳ Retry in $((attempt * 30))s..."
              sleep $((attempt * 30))
            fi
          done
          # 3 fois fail = CG bani sérieusement. On log mais on ne fail PAS le workflow
          # (sinon notif GitHub spam pour un problème externe transient).
          echo "⚠️ CG ban persistant après 3 tentatives — KV non rafraîchi cette fois."
          echo "Pas critique car KV cg-static-details:v1 reste peuplé (TTL 8h) + daily cron."
          exit 0
