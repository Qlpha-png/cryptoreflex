name: Health check (URLs + freshness sitemap-news)

# Tourne toutes les 6h. Manuel via "Run workflow" possible pour debug.
# Cron : 00:15, 06:15, 12:15, 18:15 UTC (offset 15min pour éviter de tomber pile
# au moment ou daily-content tourne, qui pourrait causer un faux positif si
# le redeploy Vercel n'est pas terminé).
on:
  schedule:
    - cron: "15 */6 * * *"
  workflow_dispatch:

# Permissions : besoin d'écrire les issues si fail.
permissions:
  contents: read
  issues: write

concurrency:
  group: health-check
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run health-check
        id: health
        run: node scripts/health-check.mjs
        # On ne veut PAS arrêter le workflow ici : on veut continuer pour
        # ouvrir l'issue + envoyer le webhook Slack. On capture l'exit via if.
        continue-on-error: true

      - name: Open GitHub issue on failure
        if: steps.health.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `[health-check] FAIL - ${date}`;
            // Avoid spam : check if an open issue with same title-prefix already exists
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "health-check",
              per_page: 50,
            });
            const already = existing.data.find((i) =>
              i.title.startsWith("[health-check] FAIL")
            );
            if (already) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: already.number,
                body: `Nouveau fail détecté ${date} — voir [run #${context.runId}](${runUrl}).`,
              });
              core.info(`Reused existing issue #${already.number}`);
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: [
                `Le health-check automatique a échoué.`,
                ``,
                `**Run** : ${runUrl}`,
                `**Date** : ${date}`,
                ``,
                `### Checks effectués`,
                `- HTTP 200 : / , /sitemap.xml, /sitemap-news.xml, /api/logo, /actualites, /analyses-techniques`,
                `- Content-type : XML pour sitemaps, image/* pour /api/logo`,
                `- Freshness : dernière news < 3 jours`,
                ``,
                `### À faire`,
                `1. Ouvrir le run GH Actions et lire les logs \`[health-N]\``,
                `2. Si \`status=null\` => probablement Vercel down (vérifier https://www.vercel-status.com)`,
                `3. Si \`status=500\` => regarder \`vercel logs cryptoreflex-fr --since 1h\``,
                `4. Si \`freshness-news\` fail => vérifier que daily-content tourne (Actions tab)`,
                ``,
                `_Issue créée automatiquement par \`.github/workflows/health-check.yml\`_`,
              ].join("\n"),
              labels: ["bug", "health-check", "monitoring"],
            });

      - name: Notify Slack on failure (optional)
        if: steps.health.outcome == 'failure' && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -fsSL -X POST -H 'Content-Type: application/json' \
            --data "{\"text\":\":rotating_light: *Cryptoreflex health-check FAIL* — voir <${RUN_URL}|run logs>\"}" \
            "$SLACK_WEBHOOK_URL" || echo "Slack webhook failed (non-blocking)"

      - name: Fail step if check failed
        if: steps.health.outcome == 'failure'
        run: |
          echo "Health-check a échoué — voir issue créée et logs ci-dessus."
          exit 1
