name: E2E tests (Playwright)

# Tourne sur chaque PR + manuellement (workflow_dispatch). On évite de bloquer
# les pushs main directs car les E2E sont coûteux en temps CI (~3-5 min) et
# que le workflow `health-check.yml` couvre déjà la prod.
#
# Périmètre : tests/e2e/*.spec.ts — funnels critiques (newsletter, login,
# checkout Stripe, AskAI gating, Cerfa 2086, alertes prix).
on:
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "tests/e2e/**"
      - "playwright.config.ts"
      - "package.json"
      - ".github/workflows/e2e.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright (chromium)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build (warm Next.js cache)
        run: npm run build
        env:
          # On veut que `npm run dev` démarre vite en webServer Playwright.
          # Le build pré-chauffe `.next/`.
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: "true"
          NEXT_TELEMETRY_DISABLED: "1"
          PLAYWRIGHT_BASE_URL: "http://localhost:3000"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results (traces / videos / screenshots) on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14
