name: Weekly long-form blog generator

# Cron samedi 8h UTC = 9h-10h Paris (selon DST). Manuel via "Run workflow" possible.
on:
  schedule:
    - cron: "0 8 * * 6"
  workflow_dispatch:

# Permissions write requise pour commit + push automatique sur main.
# Permissions issues requise pour ouvrir une issue de notif en cas de fail.
permissions:
  contents: write
  issues: write

# Concurrency : 1 seul run à la fois (évite race conditions sur git push).
concurrency:
  group: weekly-blog
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Pas de npm ci : le script est .mjs zéro-dépendance (fetch + fs natifs Node 20+).

      - name: Generate weekly long-form article
        id: gen
        run: node scripts/generate-weekly-article.mjs
        env:
          NODE_ENV: production
          # OPENROUTER_API_KEY OBLIGATOIRE — sinon le script exit 0 sans rien faire.
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Override du modèle si besoin (default : anthropic/claude-3.5-sonnet)
          # LLM_MODEL: openai/gpt-4o

      - name: Detect changes
        id: changes
        run: |
          git add content/articles
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "Aucun nouvel article à committer."
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            count=$(git diff --staged --name-only | wc -l)
            echo "$count nouvel(s) article(s) détecté(s) :"
            git diff --staged --name-only
            echo "files_count=$count" >> $GITHUB_OUTPUT
            # Récupère le slug pour le message de commit
            SLUG=$(git diff --staged --name-only | head -1 | sed 's|content/articles/||' | sed 's|.mdx$||')
            echo "slug=$SLUG" >> $GITHUB_OUTPUT
          fi

      - name: Commit + push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "Cryptoreflex Bot"
          git config user.email "bot@cryptoreflex.fr"
          DATE_UTC=$(date -u +%Y-%m-%d)
          git commit -m "feat(content): weekly long-form article — ${{ steps.changes.outputs.slug }} ($DATE_UTC)" \
            -m "Generated by .github/workflows/weekly-blog.yml" \
            -m "Files added: ${{ steps.changes.outputs.files_count }}" \
            -m "" \
            -m "Co-Authored-By: Cryptoreflex Bot <bot@cryptoreflex.fr>"
          git push origin main

      - name: Wait for Vercel deploy (90s)
        if: steps.changes.outputs.has_changes == 'true'
        run: sleep 90

      - name: Ping Google + Bing (sitemap update)
        if: steps.changes.outputs.has_changes == 'true'
        continue-on-error: true
        run: node scripts/ping-search-engines.mjs

      - name: Job summary
        if: always()
        run: |
          echo "## Cryptoreflex weekly-blog run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.changes.outputs.has_changes }}" = "true" ]; then
            echo "Nouvel article publié : **${{ steps.changes.outputs.slug }}**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- Vercel redeploy déclenché automatiquement (~90s)" >> $GITHUB_STEP_SUMMARY
            echo "- Google + Bing pingés via /sitemap-news.xml" >> $GITHUB_STEP_SUMMARY
            echo "- URL : https://www.cryptoreflex.fr/blog/${{ steps.changes.outputs.slug }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "Aucun nouvel article (validation LLM en échec, OPENROUTER_API_KEY absente, ou catalogue épuisé)." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[Vercel Dashboard](https://vercel.com/dashboard) — [Sitemap News](https://www.cryptoreflex.fr/sitemap-news.xml)" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure (open GitHub issue)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[weekly-blog] Échec génération — ${date}`,
              body: [
                `Le workflow \`weekly-blog.yml\` a échoué le ${date}.`,
                ``,
                `**Action** : ouvrir [le run GitHub Actions](${runUrl}) pour voir les logs.`,
                ``,
                `Causes probables :`,
                `- Catalogue \`lib/seo-keyword-targets.ts\` épuisé (ajouter de nouveaux topics)`,
                `- Validation LLM en échec après retry (wordCount < 1500, H2 < 5, callout YMYL absent, ou < 2 internal links)`,
                `- Quota OpenRouter dépassé`,
                `- Modèle \`anthropic/claude-3.5-sonnet\` indisponible (try \`LLM_MODEL=openai/gpt-4o\`)`,
                ``,
                `_Issue auto-créée par .github/workflows/weekly-blog.yml_`,
              ].join("\n"),
              labels: ["bot", "weekly-blog", "needs-triage"],
            });
