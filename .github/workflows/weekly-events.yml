name: Weekly events refresh

# Cron tous les lundis à 6h UTC (avant l'ouverture des marchés FR).
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: weekly-events
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Refresh events seed
        run: node scripts/refresh-events.mjs
        env:
          # API key CoinMarketCal (free tier 100 calls/jour) — facultatif.
          COINMARKETCAL_API_KEY: ${{ secrets.COINMARKETCAL_API_KEY }}

      - name: Detect + commit changes (with rebase loop anti-race)
        run: |
          git add lib/events-seed.ts
          if ! git diff --staged --quiet; then
            git config user.name "Cryptoreflex Bot"
            git config user.email "bot@cryptoreflex.fr"
            git commit -m "chore(events): weekly refresh seed ($(date -u +%Y-%m-%d))" \
              -m "Generated by .github/workflows/weekly-events.yml" \
              -m "" \
              -m "Co-Authored-By: Cryptoreflex Bot <bot@cryptoreflex.fr>"

            # Anti-race-condition cf. daily-content.yml (race observee 2026-05-06).
            pushed=false
            for i in 1 2 3; do
              if git push origin main; then
                pushed=true
                break
              fi
              echo "Push rejete, rebase + retry (tentative $i / 3)..."
              git fetch origin main
              git rebase origin/main || { git rebase --abort; break; }
              sleep 2
            done
            if [ "$pushed" = "true" ]; then
              echo "## ✅ Events seed mis à jour" >> $GITHUB_STEP_SUMMARY
            else
              echo "## ❌ Push echoue apres 3 tentatives" >> $GITHUB_STEP_SUMMARY
              exit 1
            fi
          else
            echo "## ℹ️ Aucun changement events" >> $GITHUB_STEP_SUMMARY
          fi

      # ----------------------------------------------------------------------
      # Notification d'échec (idem daily-content)
      # ----------------------------------------------------------------------
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[weekly-events] FAIL - ${date}`,
              body: [
                `Le workflow \`weekly-events\` a échoué.`,
                ``,
                `**Run** : ${runUrl}`,
                `**Date** : ${date}`,
                ``,
                `### Causes possibles`,
                `- API CoinMarketCal down ou quota dépassé (free tier 100 calls/jour)`,
                `- Format de réponse API modifié`,
                `- Échec push sur main`,
                ``,
                `### À faire`,
                `1. Ouvrir le run et lire les logs`,
                `2. Re-run manuellement après investigation`,
                ``,
                `_Issue créée automatiquement par \`.github/workflows/weekly-events.yml\`_`,
              ].join("\n"),
              labels: ["bug", "auto-content"],
            });
