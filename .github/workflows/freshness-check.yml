name: Freshness check (content/news + analyses-tech)

# Cron quotidien à 9h UTC. C'est 2h après daily-content (7h UTC) -> on laisse
# le temps au workflow de pousser ses fichiers avant de vérifier la fraîcheur.
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: freshness-check
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # On a besoin du contenu actuel sur main : depth 1 suffit.
          fetch-depth: 1

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run freshness-check
        id: freshness
        run: node scripts/freshness-check.mjs
        continue-on-error: true

      - name: Open GitHub issue on stale content
        if: steps.freshness.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `[stale-content] FAIL - ${date}`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "stale-content",
              per_page: 50,
            });
            const already = existing.data.find((i) =>
              i.title.startsWith("[stale-content] FAIL")
            );
            if (already) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: already.number,
                body: `Toujours stale au ${date} — voir [run #${context.runId}](${runUrl}).`,
              });
              core.info(`Reused existing issue #${already.number}`);
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: [
                `Le freshness-check automatique a détecté du contenu stale.`,
                ``,
                `**Run** : ${runUrl}`,
                `**Date** : ${date}`,
                ``,
                `### Seuils`,
                `- \`content/news/\` : ≥ 5 fichiers sur 7 derniers jours`,
                `- \`content/analyses-tech/\` : ≥ 5 fichiers sur 7 derniers jours`,
                ``,
                `### À faire`,
                `1. Ouvrir le run GH Actions et lire les logs \`[freshness-*]\``,
                `2. Vérifier le dernier run de \`daily-content.yml\` (Actions tab)`,
                `3. Si daily-content fail systématiquement => investiguer \`scripts/generate-daily-content.mjs\` (RSS sources, OpenRouter quota...)`,
                `4. Si daily-content OK mais 0 commit => le générateur ne produit rien (sources RSS down ?)`,
                ``,
                `_Issue créée automatiquement par \`.github/workflows/freshness-check.yml\`_`,
              ].join("\n"),
              labels: ["bug", "stale-content", "auto-content", "monitoring"],
            });

      - name: Notify Slack on stale (optional)
        if: steps.freshness.outcome == 'failure' && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -fsSL -X POST -H 'Content-Type: application/json' \
            --data "{\"text\":\":warning: *Cryptoreflex stale content* — auto-content semble bloqué, voir <${RUN_URL}|run logs>\"}" \
            "$SLACK_WEBHOOK_URL" || echo "Slack webhook failed (non-blocking)"

      - name: Fail step if stale
        if: steps.freshness.outcome == 'failure'
        run: |
          echo "Freshness-check stale — voir issue créée et logs ci-dessus."
          exit 1
