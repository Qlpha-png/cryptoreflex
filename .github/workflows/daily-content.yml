name: Daily content generator (news + TA)

# Actu du jour, TOUS LES JOURS à heure fixe.
# Cron 05:30 UTC = 07h30 Paris (été) / 06h30 (hiver).
# Pourquoi ce créneau : à 5h30 UTC toute la nuit US (clôture Wall Street) +
# la session asiatique sont passées → info du jour complète et fraîche ; et
# l'article est publié AVANT le pic de lecture matinal FR (7-9h), bon pour le
# SEO « freshness ». Minute décalée (30) pour éviter la congestion GitHub
# Actions du top d'heure (qui retarde les runs). Déploiement Vercel ~10 min
# après le push. Déclenchement manuel possible via "Run workflow".
on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:

# Permissions write requise pour commit + push automatique sur main.
# `issues: write` pour pouvoir créer une issue auto en cas d'échec (notify step).
permissions:
  contents: write
  issues: write

# Concurrency : 1 seul run à la fois (évite race conditions sur git push).
concurrency:
  group: daily-content
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch full history pour pouvoir détecter les conflits de merge éventuels
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      # Pas de npm ci : le script est .mjs zéro-dépendance (fetch + fs natifs Node 20+).
      # Si on ajoute des deps Node modules futures, dé-commenter :
      # - name: Install deps
      #   run: npm ci --omit=dev

      - name: Generate daily content (news + TA)
        run: node scripts/generate-daily-content.mjs
        env:
          NODE_ENV: production
          # REQUISE : clé API Anthropic pour le rewriter journaliste (Sonnet).
          # Si absente/KO, l'article est SAUTÉ (politique « que du pro » — plus
          # jamais de coquille vide publiée).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Detect changes
        id: changes
        run: |
          git add content/news content/analyses-tech public/news-covers
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "Aucun nouveau contenu à committer."
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            count=$(git diff --staged --name-only | wc -l)
            echo "$count nouveaux fichiers détectés :"
            git diff --staged --name-only
            echo "files_count=$count" >> $GITHUB_OUTPUT
          fi

      - name: Commit + push (with rebase loop anti-race)
        id: commit_push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "Cryptoreflex Bot"
          git config user.email "bot@cryptoreflex.fr"
          DATE_UTC=$(date -u +%Y-%m-%d)
          git commit -m "chore(content): daily auto-generate news + TA ($DATE_UTC)" \
            -m "Generated by .github/workflows/daily-content.yml" \
            -m "Files added: ${{ steps.changes.outputs.files_count }}" \
            -m "" \
            -m "Co-Authored-By: Cryptoreflex Bot <bot@cryptoreflex.fr>"

          # Anti-race-condition : si main a bougé pendant la generation
          # (push humain en parallele), on rebase + retry up to 3x.
          # Documente : la race s'est produite le 2026-05-06 (run 25435215740)
          # quand 4 commits humains ont ete pousses pendant la generation.
          for i in 1 2 3; do
            if git push origin main; then
              echo "Push reussi (tentative $i)"
              exit 0
            fi
            echo "Push rejete, rebase + retry (tentative $i / 3)..."
            git fetch origin main
            git rebase origin/main || {
              echo "Rebase a echoue (conflit) - abort"
              git rebase --abort
              exit 1
            }
            sleep 2
          done
          echo "Push echoue apres 3 tentatives - probablement conflit persistant"
          exit 1

      - name: Wait for Vercel deploy (90s)
        if: steps.changes.outputs.has_changes == 'true'
        run: sleep 90

      - name: Ping Google + Bing (sitemap update)
        if: steps.changes.outputs.has_changes == 'true'
        continue-on-error: true
        run: node scripts/ping-search-engines.mjs

      - name: Job summary
        if: always()
        run: |
          echo "## Cryptoreflex daily-content run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          # Fix audit 2026-05-06 : on lit la conclusion REELLE du step
          # commit_push, pas seulement has_changes. Avant : le summary
          # affichait \"X fichiers committes\" meme quand le push echouait
          # (run 25435215740) - source de confusion en debug.
          if [ "${{ steps.changes.outputs.has_changes }}" = "false" ]; then
            echo "ℹ️  Aucun nouveau contenu (fichiers déjà à jour ou sources RSS down)." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.commit_push.conclusion }}" = "success" ]; then
            echo "✅ **${{ steps.changes.outputs.files_count }} nouveaux fichiers committés et pushés**" >> $GITHUB_STEP_SUMMARY
            echo "→ Coolify/Vercel redeploy déclenché automatiquement (~90s)" >> $GITHUB_STEP_SUMMARY
            echo "→ Google + Bing pingés via /sitemap-news.xml" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Push échoué** (${{ steps.changes.outputs.files_count }} fichiers générés localement mais non pushés)." >> $GITHUB_STEP_SUMMARY
            echo "→ Voir le log du step \`Commit + push\` pour la cause exacte." >> $GITHUB_STEP_SUMMARY
            echo "→ Causes typiques : non-fast-forward (race), token expiré, branch protection." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[Site](https://www.cryptoreflex.fr) — [Sitemap News](https://www.cryptoreflex.fr/sitemap-news.xml)" >> $GITHUB_STEP_SUMMARY

      # ----------------------------------------------------------------------
      # Notification automatique en cas d'échec : ouvre une issue GitHub avec
      # contexte (run URL, labels). Pas de spam : un fail unique = 1 issue.
      # ----------------------------------------------------------------------
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[daily-content] FAIL - ${date}`,
              body: [
                `Le workflow \`daily-content\` a échoué.`,
                ``,
                `**Run** : ${runUrl}`,
                `**Date** : ${date}`,
                ``,
                `### Causes possibles`,
                `- Sources RSS (Cointelegraph, etc.) down ou rate-limit`,
                `- Quota OpenRouter dépassé (rewriter LLM)`,
                `- Conflit de merge sur \`content/news\` ou \`content/analyses-tech\``,
                `- Échec push sur main (token expiré ?)`,
                ``,
                `### À faire`,
                `1. Ouvrir le run et lire les logs étape par étape`,
                `2. Si rewriter HS : check \`ANTHROPIC_API_KEY\` (secret + quota)`,
                `3. Re-run manuellement (workflow_dispatch) après fix`,
                ``,
                `_Issue créée automatiquement par \`.github/workflows/daily-content.yml\`_`,
              ].join("\n"),
              labels: ["bug", "auto-content", "urgent"],
            });
