name: Daily content generator (news + TA)

# Cron 7h UTC = 8-9h Paris (selon DST). Manuel via "Run workflow" possible.
on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

# Permissions write requise pour commit + push automatique sur main.
# `issues: write` pour pouvoir créer une issue auto en cas d'échec (notify step).
permissions:
  contents: write
  issues: write

# Concurrency : 1 seul run à la fois (évite race conditions sur git push).
concurrency:
  group: daily-content
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch full history pour pouvoir détecter les conflits de merge éventuels
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Pas de npm ci : le script est .mjs zéro-dépendance (fetch + fs natifs Node 20+).
      # Si on ajoute des deps Node modules futures, dé-commenter :
      # - name: Install deps
      #   run: npm ci --omit=dev

      - name: Generate daily content (news + TA)
        run: node scripts/generate-daily-content.mjs
        env:
          NODE_ENV: production
          # Optionnel : key OpenRouter pour rewriter LLM (qualité éditoriale +50%).
          # Si absent, fallback sur rewriter déterministe.
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Detect changes
        id: changes
        run: |
          git add content/news content/analyses-tech
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "Aucun nouveau contenu à committer."
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            count=$(git diff --staged --name-only | wc -l)
            echo "$count nouveaux fichiers détectés :"
            git diff --staged --name-only
            echo "files_count=$count" >> $GITHUB_OUTPUT
          fi

      - name: Commit + push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "Cryptoreflex Bot"
          git config user.email "bot@cryptoreflex.fr"
          DATE_UTC=$(date -u +%Y-%m-%d)
          git commit -m "chore(content): daily auto-generate news + TA ($DATE_UTC)" \
            -m "Generated by .github/workflows/daily-content.yml" \
            -m "Files added: ${{ steps.changes.outputs.files_count }}" \
            -m "" \
            -m "Co-Authored-By: Cryptoreflex Bot <bot@cryptoreflex.fr>"
          git push origin main

      - name: Wait for Vercel deploy (90s)
        if: steps.changes.outputs.has_changes == 'true'
        run: sleep 90

      - name: Ping Google + Bing (sitemap update)
        if: steps.changes.outputs.has_changes == 'true'
        continue-on-error: true
        run: node scripts/ping-search-engines.mjs

      - name: Job summary
        if: always()
        run: |
          echo "## Cryptoreflex daily-content run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.changes.outputs.has_changes }}" = "true" ]; then
            echo "✅ **${{ steps.changes.outputs.files_count }} nouveaux fichiers committés**" >> $GITHUB_STEP_SUMMARY
            echo "→ Vercel redeploy déclenché automatiquement (~90s)" >> $GITHUB_STEP_SUMMARY
            echo "→ Google + Bing pingés via /sitemap-news.xml" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️  Aucun nouveau contenu (fichiers déjà à jour ou sources RSS down)." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[Vercel Dashboard](https://vercel.com/dashboard) — [Sitemap News](https://www.cryptoreflex.fr/sitemap-news.xml)" >> $GITHUB_STEP_SUMMARY

      # ----------------------------------------------------------------------
      # Notification automatique en cas d'échec : ouvre une issue GitHub avec
      # contexte (run URL, labels). Pas de spam : un fail unique = 1 issue.
      # ----------------------------------------------------------------------
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[daily-content] FAIL - ${date}`,
              body: [
                `Le workflow \`daily-content\` a échoué.`,
                ``,
                `**Run** : ${runUrl}`,
                `**Date** : ${date}`,
                ``,
                `### Causes possibles`,
                `- Sources RSS (Cointelegraph, etc.) down ou rate-limit`,
                `- Quota OpenRouter dépassé (rewriter LLM)`,
                `- Conflit de merge sur \`content/news\` ou \`content/analyses-tech\``,
                `- Échec push sur main (token expiré ?)`,
                ``,
                `### À faire`,
                `1. Ouvrir le run et lire les logs étape par étape`,
                `2. Si rewriter HS : check \`OPENROUTER_API_KEY\` quota`,
                `3. Re-run manuellement (workflow_dispatch) après fix`,
                ``,
                `_Issue créée automatiquement par \`.github/workflows/daily-content.yml\`_`,
              ].join("\n"),
              labels: ["bug", "auto-content", "urgent"],
            });
