<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Ledger">
  <!-- Fond noir signature Ledger officiel -->
  <rect width="64" height="64" rx="14" fill="#000000"/>
  <!-- Logomark "L" stylisé Ledger : sharp serif moderne, géométrique pur (no font deps) -->
  <g fill="#ffffff">
    <!-- Vertical bar du L (large, premium) -->
    <rect x="20" y="16" width="6" height="32" rx="0.8"/>
    <!-- Horizontal bar du L -->
    <rect x="20" y="42" width="22" height="6" rx="0.8"/>
    <!-- Accent dot signature top-right (rappel logo Ledger Live) -->
    <circle cx="44" cy="20" r="3" fill="#F59E0B"/>
  </g>
</svg>
